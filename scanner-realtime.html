<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020617">
  <title>Scanner entradas realtime</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root{--bg:#020617;--card:#0f172a;--text:#f8fafc;--muted:#aebbd0;--border:rgba(255,255,255,.12);--blue:#2563eb;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,rgba(37,99,235,.28),transparent 34%),radial-gradient(circle at bottom right,rgba(22,163,74,.12),transparent 32%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding-bottom:calc(86px + env(safe-area-inset-bottom))}button,input,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}.app{max-width:760px;margin:0 auto;padding:14px}.card{background:rgba(15,23,42,.97);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:0 22px 60px rgba(0,0,0,.30);margin-bottom:14px}.title{font-size:31px;line-height:1.05;font-weight:950;letter-spacing:-.04em}.subtitle{color:var(--muted);font-size:15px;margin-top:6px;line-height:1.4}.mt{margin-top:14px}input,select{width:100%;min-height:52px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:white;padding:13px 14px;outline:none}input::placeholder{color:#8795aa}select option{color:#111827}.btn{width:100%;min-height:52px;border:0;border-radius:16px;background:var(--blue);color:white;font-size:16px;font-weight:850;padding:12px 16px}.btn.secondary{background:rgba(255,255,255,.10);border:1px solid var(--border)}.btn.danger{background:var(--bad)}.btn.ok{background:var(--ok)}.btn.small{min-height:42px;font-size:14px;border-radius:13px}.btn:disabled{opacity:.55;cursor:default}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:rgba(255,255,255,.075);border:1px solid var(--border);border-radius:18px;padding:14px 10px;text-align:center}.stat-number{font-size:30px;font-weight:950;line-height:1}.stat-label{font-size:12px;color:var(--muted);margin-top:6px;font-weight:750}.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:850;border:1px solid var(--border);background:rgba(255,255,255,.08)}.pill.ok{color:#bbf7d0;background:rgba(22,163,74,.18)}.pill.warn{color:#fde68a;background:rgba(217,119,6,.18)}.pill.bad{color:#fecaca;background:rgba(220,38,38,.18)}.pill.salon{color:#bfdbfe;background:rgba(37,99,235,.16)}.pill.palco{color:#fbcfe8;background:rgba(190,24,93,.16)}.notice{margin-top:12px;padding:13px;border-radius:15px;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.45);color:#fde68a;font-size:14px;line-height:1.45}.success{margin-top:12px;padding:13px;border-radius:15px;background:rgba(22,163,74,.14);border:1px solid rgba(22,163,74,.45);color:#bbf7d0;font-size:14px;line-height:1.45}.error-box{margin-top:12px;padding:13px;border-radius:15px;background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.45);color:#fecaca;font-size:14px;line-height:1.45}.reader-wrap{position:relative;overflow:hidden;border-radius:22px;border:1px solid var(--border);background:#000;min-height:330px}#preview{width:100%;height:min(58vh,520px);object-fit:cover;display:block;background:#000}.scan-frame{pointer-events:none;position:absolute;inset:18%;border:3px solid rgba(255,255,255,.88);border-radius:22px;box-shadow:0 0 0 999px rgba(0,0,0,.28)}.scan-line{position:absolute;left:18%;right:18%;top:50%;height:2px;background:rgba(34,197,94,.95);box-shadow:0 0 20px rgba(34,197,94,.75);animation:scan 1.8s linear infinite}@keyframes scan{0%{top:22%}50%{top:78%}100%{top:22%}}.result-card{border-radius:24px;padding:20px;margin-bottom:14px;border:1px solid var(--border);background:rgba(255,255,255,.06)}.result-card.ok{background:rgba(22,163,74,.16);border-color:rgba(34,197,94,.5)}.result-card.warn{background:rgba(217,119,6,.16);border-color:rgba(245,158,11,.5)}.result-card.bad{background:rgba(220,38,38,.16);border-color:rgba(248,113,113,.5)}.result-main{font-size:28px;font-weight:950;letter-spacing:-.03em}.result-name{margin-top:8px;font-size:20px;font-weight:900}.result-meta{color:var(--muted);margin-top:6px;line-height:1.45;font-size:15px}.ticket-row{padding:13px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.06);margin-top:10px}.ticket-row.used{border-color:rgba(245,158,11,.38);background:rgba(245,158,11,.08)}.ticket-row.pending{border-color:rgba(34,197,94,.38);background:rgba(34,197,94,.08)}.ticket-name{font-weight:950;font-size:17px}.ticket-meta{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.4;word-break:break-word}.ticket-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(760px,100%);padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(2,6,23,.94);backdrop-filter:blur(18px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:9999}.nav-btn{border:0;background:transparent;color:var(--muted);border-radius:14px;padding:8px 4px;min-height:53px;font-size:11px;font-weight:800}.nav-btn .nav-icon{display:block;font-size:21px;margin-bottom:2px}.nav-btn.active{background:rgba(37,99,235,.18);color:white}.small-text{color:var(--muted);font-size:13px;line-height:1.4}@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}.title{font-size:27px}.reader-wrap{min-height:280px}}
  </style>
</head>
<body>
  <div class="app">
    <section id="loginView" class="card">
      <div class="title">Scanner entradas</div>
      <div class="subtitle">Control de acceso realtime para puertas.</div>
      <div class="mt"><input id="emailInput" type="text" placeholder="patio1" autocomplete="username" autocapitalize="none" spellcheck="false"></div>
      <div class="small-text mt">No hace falta escribir @graduacion.local</div>
      <div class="mt"><input id="passwordInput" type="password" placeholder="Contraseña" autocomplete="current-password"></div>
      <div class="mt"><button id="loginButton" class="btn">Entrar</button></div>
      <div id="loginMessage"></div>
    </section>
    <main id="mainApp" class="hidden">
      <section id="scanPage" class="page-view">
        <section class="card">
          <div class="ticket-top"><div><div class="title">Escanear</div><div id="userText" class="subtitle"></div></div><span id="zoneBadge" class="pill">Zona</span></div>
          <div class="reader-wrap mt"><video id="preview" playsinline muted></video><canvas id="canvas" class="hidden"></canvas><div class="scan-frame"></div><div class="scan-line"></div></div>
          <div class="grid2 mt"><button id="startCameraButton" class="btn">Activar cámara</button><button id="stopCameraButton" class="btn secondary">Pausar</button></div>
          <div id="scanResult" class="mt"></div>
        </section>
      </section>
      <section id="searchPage" class="page-view hidden"><section class="card"><div class="title">Buscar entrada</div><div class="subtitle">Busca por código, nombre, fila o butaca.</div><div class="mt"><input id="searchInput" type="search" placeholder="Nombre, código, fila 8, butaca 12..."></div><div id="searchResults" class="mt"></div></section></section>
      <section id="summaryPage" class="page-view hidden"><section class="card"><div class="title">Resumen</div><div class="subtitle">Datos realtime de esta zona.</div><div class="grid3 mt"><div class="stat"><div id="totalStat" class="stat-number">-</div><div class="stat-label">Total</div></div><div class="stat"><div id="usedStat" class="stat-number">-</div><div class="stat-label">Dentro</div></div><div class="stat"><div id="pendingStat" class="stat-number">-</div><div class="stat-label">Pendientes</div></div></div></section><section class="card"><div class="title" style="font-size:22px">Últimos accesos</div><div id="recentLogs" class="mt"></div></section></section>
      <section id="settingsPage" class="page-view hidden"><section class="card"><div class="title">Ajustes</div><div id="settingsInfo" class="subtitle"></div><div class="mt"><select id="cameraSelect"></select></div><div class="grid2 mt"><button id="reloadButton" class="btn secondary">Recargar datos</button><button id="logoutButton" class="btn danger">Salir</button></div></section></section>
    </main>
  </div>
  <nav id="bottomNav" class="bottom-nav hidden"><button type="button" id="navScan" class="nav-btn active" data-page="scan"><span class="nav-icon">▣</span>Escanear</button><button type="button" id="navSearch" class="nav-btn" data-page="search"><span class="nav-icon">⌕</span>Buscar</button><button type="button" id="navSummary" class="nav-btn" data-page="summary"><span class="nav-icon">▤</span>Resumen</button><button type="button" id="navSettings" class="nav-btn" data-page="settings"><span class="nav-icon">⚙</span>Ajustes</button></nav>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, runTransaction, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    const SHEETS_SYNC_URL="https://script.google.com/macros/s/AKfycbzlh_yy3pi8vtVztFqhBHUkv4WD0MvZQSUsHLhyEyCSJ0jkI8Z4Nz5qI8CQWap8XrXZ/exec";
    const SHEETS_SYNC_SECRET="graduacion-realtime-2026";
    const firebaseConfig={apiKey:"AIzaSyAGnL63iINYf-7igUVb_JwaWNoYHiErf2k",authDomain:"control-entradas-64826hfgr.firebaseapp.com",projectId:"control-entradas-64826hfgr",storageBucket:"control-entradas-64826hfgr.firebasestorage.app",messagingSenderId:"779578072302",appId:"1:779578072302:web:57216df153bcb2319767ff"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
    let currentUser=null,userEmail="",deviceLabel="",allowedZone="ALL",tickets={},recentLogs=[],unsubscribeTickets=null,unsubscribeCheckins=null,stream=null,scanning=false,lastScannedCode="",lastScannedAt=0,selectedCameraId=localStorage.getItem("scanner_camera_id")||"";
    const loginView=document.getElementById("loginView"),mainApp=document.getElementById("mainApp"),bottomNav=document.getElementById("bottomNav"),video=document.getElementById("preview"),canvas=document.getElementById("canvas"),canvasContext=canvas.getContext("2d",{willReadFrequently:true});
    document.getElementById("loginButton").addEventListener("click",login);document.getElementById("passwordInput").addEventListener("keydown",e=>{if(e.key==="Enter")login()});document.getElementById("startCameraButton").addEventListener("click",startCamera);document.getElementById("stopCameraButton").addEventListener("click",stopCamera);document.getElementById("logoutButton").addEventListener("click",logout);document.getElementById("reloadButton").addEventListener("click",()=>renderAll());document.getElementById("searchInput").addEventListener("input",renderSearch);document.getElementById("cameraSelect").addEventListener("change",async e=>{selectedCameraId=e.target.value;localStorage.setItem("scanner_camera_id",selectedCameraId);if(scanning)await startCamera()});document.querySelectorAll(".nav-btn[data-page]").forEach(b=>b.addEventListener("click",()=>showPage(b.dataset.page)));
    onAuthStateChanged(auth,async user=>{if(!user){currentUser=null;loginView.classList.remove("hidden");mainApp.classList.add("hidden");bottomNav.classList.add("hidden");stopCamera();if(unsubscribeTickets)unsubscribeTickets();if(unsubscribeCheckins)unsubscribeCheckins();unsubscribeTickets=null;unsubscribeCheckins=null;return}currentUser=user;userEmail=(user.email||"").toLowerCase();deviceLabel=userEmail.split("@")[0]||"scanner";allowedZone=getAllowedZoneFromEmail(userEmail);loginView.classList.add("hidden");mainApp.classList.remove("hidden");bottomNav.classList.remove("hidden");document.getElementById("userText").textContent=`${deviceLabel} · ${userEmail}`;document.getElementById("settingsInfo").textContent=`${deviceLabel} · ${userEmail}`;renderZoneBadge();subscribeTickets();subscribeRecentCheckins();showPage("scan");await loadCameras();setTimeout(()=>startCamera().catch(()=>{}),300)});
    async function login(){let email=document.getElementById("emailInput").value.trim().toLowerCase();const password=document.getElementById("passwordInput").value,button=document.getElementById("loginButton"),message=document.getElementById("loginMessage");if(email&&!email.includes("@"))email=email+"@graduacion.local";if(!email||!password){message.innerHTML='<div class="notice">Introduce usuario y contraseña.</div>';return}button.disabled=true;button.textContent="Entrando...";message.innerHTML="";try{await signInWithEmailAndPassword(auth,email,password)}catch(error){message.innerHTML=`<div class="error-box">No se ha podido iniciar sesión.<br>${escapeHtml(error.message)}</div>`}finally{button.disabled=false;button.textContent="Entrar"}}
    async function logout(){stopCamera();await signOut(auth)}
    function getAllowedZoneFromEmail(email){const prefix=String(email||"").split("@")[0].toLowerCase();if(prefix.startsWith("palco"))return"PALCO";if(prefix.startsWith("patio"))return"PATIO";if(prefix.startsWith("admin"))return"ALL";return"ALL"}
    function renderZoneBadge(){const b=document.getElementById("zoneBadge");if(allowedZone==="PALCO"){b.className="pill palco";b.textContent="PALCO"}else if(allowedZone==="PATIO"){b.className="pill salon";b.textContent="SALÓN PRINCIPAL"}else{b.className="pill ok";b.textContent="TODAS"}}
    function showPage(page){["scan","search","summary","settings"].forEach(name=>{document.getElementById(name+"Page").classList.toggle("hidden",name!==page);document.getElementById("nav"+capitalize(name)).classList.toggle("active",name===page)});if(page==="search")renderSearch();if(page==="summary")renderSummary();window.scrollTo(0,0)}
    function capitalize(v){return v.charAt(0).toUpperCase()+v.slice(1)}
    function subscribeTickets(){if(unsubscribeTickets)unsubscribeTickets();unsubscribeTickets=onSnapshot(collection(db,"tickets"),snap=>{tickets={};snap.forEach(d=>{const data=d.data();tickets[data.codigo||d.id]={...data,codigo:data.codigo||d.id}});renderAll()},error=>{console.error(error);document.getElementById("scanResult").innerHTML=`<div class="error-box">Error leyendo Firebase: ${escapeHtml(error.message)}</div>`})}
    function subscribeRecentCheckins(){if(unsubscribeCheckins)unsubscribeCheckins();const q=query(collection(db,"checkins"),orderBy("checkin_at","desc"),limit(20));unsubscribeCheckins=onSnapshot(q,snap=>{recentLogs=[];snap.forEach(d=>recentLogs.push(d.data()));renderRecentLogs()},error=>console.error(error))}
    function renderAll(){renderSummary();renderSearch();renderRecentLogs()}function getVisibleTickets(){return Object.values(tickets).filter(t=>allowedZone==="ALL"||getTicketAccessZone(t)===allowedZone)}
    function renderSummary(){const v=getVisibleTickets(),total=v.length,used=v.filter(t=>t.usado===true).length;document.getElementById("totalStat").textContent=total||"-";document.getElementById("usedStat").textContent=used;document.getElementById("pendingStat").textContent=Math.max(total-used,0)}
    function renderRecentLogs(){const c=document.getElementById("recentLogs"),logs=recentLogs.filter(l=>allowedZone==="ALL"||getTicketAccessZone(l)===allowedZone).slice(0,12);c.innerHTML=logs.length?logs.map(l=>`<div class="ticket-row used"><div class="ticket-top"><div><div class="ticket-name">${escapeHtml(l.nombre||"Sin nombre")}</div><div class="ticket-meta">${escapeHtml(l.zona_label||l.zona||"")} · Fila ${escapeHtml(l.fila||"-")} · Butaca ${escapeHtml(l.butaca||"-")}<br>${escapeHtml(formatDate(l.checkin_at||""))}${l.checkin_by?" · "+escapeHtml(l.checkin_by):""}</div></div><span class="pill ok">OK</span></div></div>`).join(""):'<div class="small-text">Todavía no hay accesos registrados.</div>'}
    function renderSearch(){const c=document.getElementById("searchResults"),q=normalizeSearch(document.getElementById("searchInput").value);if(!q){c.innerHTML='<div class="small-text">Escribe algo para buscar.</div>';return}const results=getVisibleTickets().filter(t=>normalizeSearch([t.codigo,t.nombre,t.email,t.zona,t.zona_label,"fila "+t.fila,"butaca "+t.butaca,t.fila,t.butaca].join(" ")).includes(q)).slice(0,50);if(!results.length){c.innerHTML='<div class="notice">No hay entradas con esa búsqueda.</div>';return}c.innerHTML=results.map(t=>{const z=getTicketAccessZone(t),used=t.usado===true,zoneText=z==="PALCO"?"PALCO":"SALÓN PRINCIPAL",zoneClass=z==="PALCO"?"palco":"salon";return `<div class="ticket-row ${used?"used":"pending"}"><div class="ticket-top"><div><div class="ticket-name">${escapeHtml(t.nombre||"Sin nombre")}</div><div class="ticket-meta">${escapeHtml(t.codigo||"")}<br>Fila ${escapeHtml(t.fila||"-")} · Butaca ${escapeHtml(t.butaca||"-")}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end"><span class="pill ${zoneClass}">${zoneText}</span><span class="pill ${used?"warn":"ok"}">${used?"USADA":"PENDIENTE"}</span></div></div>${used?`<div class="ticket-meta mt">Validada: ${escapeHtml(formatDate(t.checkin_at||""))}${t.checkin_by?" · "+escapeHtml(t.checkin_by):""}</div>`:""}<div class="mt"><button class="btn small ${used?"secondary":"ok"}" data-code="${escapeHtml(t.codigo||"")}">${used?"Ver estado":"Validar manualmente"}</button></div></div>`}).join("");c.querySelectorAll("button[data-code]").forEach(b=>b.addEventListener("click",()=>handleCode(b.dataset.code,true)))}
    async function loadCameras(){try{await navigator.mediaDevices.getUserMedia({video:true});const devices=await navigator.mediaDevices.enumerateDevices(),cameras=devices.filter(d=>d.kind==="videoinput"),select=document.getElementById("cameraSelect");select.innerHTML=cameras.map((cam,i)=>`<option value="${escapeHtml(cam.deviceId)}">${escapeHtml(cam.label||"Cámara "+(i+1))}</option>`).join("");if(selectedCameraId&&cameras.some(c=>c.deviceId===selectedCameraId)){select.value=selectedCameraId}else if(cameras.length){const back=cameras.find(c=>/back|rear|trasera|environment/i.test(c.label));selectedCameraId=(back||cameras[cameras.length-1]).deviceId;select.value=selectedCameraId;localStorage.setItem("scanner_camera_id",selectedCameraId)}stopCamera()}catch(e){console.warn(e)}}
    async function startCamera(){stopCamera();const constraints={audio:false,video:selectedCameraId?{deviceId:{exact:selectedCameraId}}:{facingMode:{ideal:"environment"}}};stream=await navigator.mediaDevices.getUserMedia(constraints);video.srcObject=stream;await video.play();scanning=true;requestAnimationFrame(scanLoop)}
    function stopCamera(){scanning=false;if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;video.srcObject=null}
    function scanLoop(){if(!scanning||!video.videoWidth||!video.videoHeight){if(scanning)requestAnimationFrame(scanLoop);return}canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvasContext.drawImage(video,0,0,canvas.width,canvas.height);const imageData=canvasContext.getImageData(0,0,canvas.width,canvas.height),result=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:"attemptBoth"});if(result&&result.data)handleCode(result.data,false);requestAnimationFrame(scanLoop)}
    async function handleCode(rawCode,manual){const code=normalizeCode(rawCode),now=Date.now();if(!code)return;if(!manual&&code===lastScannedCode&&now-lastScannedAt<2500)return;lastScannedCode=code;lastScannedAt=now;document.getElementById("scanResult").innerHTML='<div class="notice">Comprobando entrada...</div>';try{const result=await validateTicketTransaction(code);if(result.status==="OK"){showValidationResult("ok","ACCESO OK",result.ticket);syncSheetAction({action:"checkin",codigo:result.ticket.codigo||code,checkin_at:result.ticket.checkin_at||"",checkin_by:result.ticket.checkin_by||"",checkin_email:result.ticket.checkin_email||""},ok=>{if(!ok)document.getElementById("scanResult").innerHTML+='<div class="notice">⚠️ Entrada validada en Firebase, pero no se ha podido escribir en Excel.</div>'})}else if(result.status==="ALREADY_USED"){showValidationResult("warn","YA USADA",result.ticket)}else if(result.status==="WRONG_ZONE"){showValidationResult("bad","ZONA INCORRECTA",result.ticket,"Esta entrada no corresponde a esta puerta.")}else{document.getElementById("scanResult").innerHTML=`<div class="result-card bad"><div class="result-main">ENTRADA NO VÁLIDA</div><div class="result-meta">${escapeHtml(code)}</div></div>`}}catch(error){document.getElementById("scanResult").innerHTML=`<div class="error-box">Error validando entrada:<br>${escapeHtml(error.message)}</div>`}}
    async function validateTicketTransaction(code){const ticketRef=doc(db,"tickets",code),checkinRef=doc(db,"checkins",code);return await runTransaction(db,async tx=>{const snap=await tx.get(ticketRef);if(!snap.exists())return{status:"NOT_FOUND"};const ticket=snap.data(),ticketZone=getTicketAccessZone(ticket);if(allowedZone!=="ALL"&&ticketZone!==allowedZone)return{status:"WRONG_ZONE",ticket};if(ticket.usado===true)return{status:"ALREADY_USED",ticket};const nowIso=new Date().toISOString(),updated={usado:true,checkin_at:nowIso,checkin_by:deviceLabel,checkin_uid:currentUser.uid,checkin_email:currentUser.email||"",last_update_source:"scanner_realtime"};tx.update(ticketRef,updated);tx.set(checkinRef,{codigo:ticket.codigo||code,nombre:ticket.nombre||"",zona:ticket.zona||"",zona_label:ticket.zona_label||"",fila:ticket.fila||"",butaca:ticket.butaca||"",tipo_entrada:ticket.tipo_entrada||"",checkin_at:nowIso,checkin_by:deviceLabel,checkin_uid:currentUser.uid,checkin_email:currentUser.email||"",created_at:nowIso});return{status:"OK",ticket:{...ticket,codigo:ticket.codigo||code,...updated}}})}
    function showValidationResult(kind,mainText,ticket,extraText=""){const zone=getTicketAccessZone(ticket),zoneText=zone==="PALCO"?"PALCO":"SALÓN PRINCIPAL";document.getElementById("scanResult").innerHTML=`<div class="result-card ${kind}"><div class="result-main">${escapeHtml(mainText)}</div><div class="result-name">${escapeHtml(ticket.nombre||"Sin nombre")}</div><div class="result-meta">${escapeHtml(zoneText)} · Fila ${escapeHtml(ticket.fila||"-")} · Butaca ${escapeHtml(ticket.butaca||"-")}<br>${escapeHtml(ticket.codigo||"")}${ticket.checkin_at?"<br>Validada: "+escapeHtml(formatDate(ticket.checkin_at)):""}${ticket.checkin_by?" · "+escapeHtml(ticket.checkin_by):""}${extraText?"<br><br>"+escapeHtml(extraText):""}</div></div>`}
    function syncSheetAction(params,callback){const cb="__scanner_sync_cb_"+Date.now()+"_"+Math.random().toString(36).slice(2),script=document.createElement("script");window[cb]=res=>{cleanup();callback?.(res&&res.status==="OK",res)};script.onerror=()=>{cleanup();callback?.(false,null)};function cleanup(){try{delete window[cb]}catch(e){}if(script.parentNode)script.parentNode.removeChild(script)}const url=new URL(SHEETS_SYNC_URL);url.searchParams.set("secret",SHEETS_SYNC_SECRET);url.searchParams.set("callback",cb);url.searchParams.set("_",Date.now());for(const k in params){if(Object.prototype.hasOwnProperty.call(params,k))url.searchParams.set(k,params[k]??"")}script.src=url.toString();document.head.appendChild(script)}
    function normalizeCode(raw){let text=String(raw||"").trim();try{const url=new URL(text),code=url.searchParams.get("code")||url.searchParams.get("codigo");if(code)return code.trim().toUpperCase()}catch(e){}const match=text.match(/EV26-[A-Z0-9-]+/i);if(match)return match[0].toUpperCase();return text.toUpperCase()}function normalizeSearch(v){return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim()}function getTicketAccessZone(ticket){const raw=String(ticket&&(ticket.zonaId||ticket.zona||ticket.zona_label||"")).toUpperCase();return raw.includes("PALCO")?"PALCO":"PATIO"}function formatDate(value){if(!value)return"";try{return new Date(value).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"})}catch(e){return value}}function escapeHtml(value){return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
  </script>
